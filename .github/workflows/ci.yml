name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Verify the package installs and the console script works
        run: |
          python -m venv /tmp/anchor-install-check
          /tmp/anchor-install-check/bin/pip install -q -e .
          cd /tmp
          /tmp/anchor-install-check/bin/anchor --list

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          pip install shellcheck-py
          shellcheck config.sh bin/anchor

  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs pages are reviewed after their source changes
        run: python3 scripts/check_docs_sync.py
